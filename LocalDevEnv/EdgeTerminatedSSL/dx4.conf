##############################################################
# HTTP → HTTPS Redirect (Wildcard)
##############################################################
server {
    listen 80;
    server_name *.dx4localdev.duckdns.org;
    return 301 https://$host$request_uri;
}

##############################################################
# CSB
##############################################################
server {
    listen 443 ssl;
    server_name csb.dx4localdev.duckdns.org;

    ssl_certificate     /etc/letsencrypt/live/dx4localdev.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dx4localdev.duckdns.org/privkey.pem;

    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;

    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    location / {
        proxy_pass http://dx4-csb:8080;
    }
}

