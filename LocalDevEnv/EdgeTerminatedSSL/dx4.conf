##############################################################
# PGADMIN
##############################################################
server {
    listen 443 ssl;
    server_name pgadmin.dx4localdev.duckdns.org;

    ssl_certificate     /etc/letsencrypt/live/dx4localdev.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dx4localdev.duckdns.org/privkey.pem;

    auth_basic "pgAdmin Restricted";
    auth_basic_user_file /etc/nginx/auth/pgadmin.htpasswd;

    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    proxy_set_header Host $host;
