##############################################################
# ADMIN CLIENT (noVNC)
##############################################################
server {
    listen 443 ssl;
    server_name adminclient.dx4local.duckdns.org;

    ssl_certificate     /etc/letsencrypt/live/dx4local.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dx4local.duckdns.org/privkey.pem;

    # Basic auth (same credentials file as pgAdmin)
    auth_basic "Admin Client Restricted";
    auth_basic_user_file /etc/nginx/auth/pgadmin.htpasswd;

    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;

    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # noVNC uses WebSockets (websockify) under /websockify by default
    location / {
        proxy_pass http://dx4-admin:6080;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;

        proxy_buffering off;
    }
}
