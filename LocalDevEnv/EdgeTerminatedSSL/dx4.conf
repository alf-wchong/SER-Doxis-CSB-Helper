##############################################################
# HTTP → HTTPS Redirect (Wildcard)
##############################################################
server {
    listen 80;
    server_name *.dx4local.duckdns.org;
    return 301 https://$host$request_uri;
}

##############################################################
# HTTP → HTTPS Redirect (Apex)
##############################################################
server {
    listen 80;
    server_name dx4local.duckdns.org;
    return 301 https://$host$request_uri;
}

##############################################################
# APEX DOMAIN: WebCube + Business Studio
#   - WebCube:        https://dx4local.duckdns.org/webcube/
#   - Business Studio https://dx4local.duckdns.org/businessstudio/
##############################################################
server {
    listen 443 ssl;
    server_name dx4local.duckdns.org;

    ssl_certificate     /etc/letsencrypt/live/dx4local.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dx4local.duckdns.org/privkey.pem;

    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;

    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # Normalize missing trailing slash
    location = /webcube {
        return 302 /webcube/;
    }

    # WebCube app
    location /webcube/ {
        proxy_pass http://dx4-webcube:8080;

        proxy_http_version 1.1;

        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;

        proxy_buffering off;
    }

    # Business Studio
    # Normalize missing trailing slash
    location = /businessstudio {
        return 302 /businessstudio/;
    }

    # Optional nice UX: if someone goes to /businessstudio/ it may redirect internally to /businessstudio/web/
    location /businessstudio/ {
        # Trailing slash on proxy_pass is important for predictable URI mapping
        proxy_pass http://dx4-businessstudio:8080;

        proxy_http_version 1.1;

        # Usually not needed, but harmless. Keep consistent with the rest.
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        proxy_set_header Connection "";

        proxy_connect_timeout 300s;
        proxy_send_timeout    300s;
        proxy_read_timeout    300s;
        send_timeout          300s;

        proxy_buffering off;
    }

    # Everything else on apex domain:
    # Pick one behavior. This is the safest default:
    location / {
        return 404;
    }
}

