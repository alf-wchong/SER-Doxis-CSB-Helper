##############################################################
# HTTP → HTTPS Redirect (Wildcard)
##############################################################
server {
    listen 80;
    server_name *.***REMOVED***.duckdns.org;
    return 301 https://$host$request_uri;
}

##############################################################
# HTTP → HTTPS Redirect (Apex)
##############################################################
server {
    listen 80;
    server_name ***REMOVED***.duckdns.org;
    return 301 https://$host$request_uri;
}

##############################################################
# APEX DOMAIN: WebCube at https://***REMOVED***.duckdns.org/webcube/
##############################################################
server {
    listen 443 ssl;
    server_name ***REMOVED***.duckdns.org;

    ssl_certificate     /etc/letsencrypt/live/***REMOVED***.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/***REMOVED***.duckdns.org/privkey.pem;

    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;

    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # Normalize missing trailing slash
    location = /webcube {
        return 302 /webcube/;
    }

    # WebCube app
    location /webcube/ {
        proxy_pass http://dx4-webcube:8080;

        proxy_http_version 1.1;

        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;

        proxy_buffering off;
    }

    # Everything else on apex domain:
    # Pick one behavior. This is the safest default:
    location / {
        return 404;
    }
}

##############################################################
# CSB
##############################################################
server {
    listen 443 ssl;
    server_name csb.***REMOVED***.duckdns.org;

    ssl_certificate     /etc/letsencrypt/live/***REMOVED***.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/***REMOVED***.duckdns.org/privkey.pem;

    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;

    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    location / {
        proxy_pass http://dx4-csb:8080;
        
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";

        proxy_connect_timeout 300s;
        proxy_send_timeout    300s;
        proxy_read_timeout    300s;
        send_timeout          300s;

        proxy_buffering off;         
    }
}

